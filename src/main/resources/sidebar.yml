# ============================================================
# HeadHunter — sidebar.yml
# Scoreboard sidebar layout and display colors.
# Reload with: /hh reload sidebar
# ============================================================

# Server name displayed at the top of the sidebar (bold, green)
server-name: "HeadHunter"

# BossBar colors per progression tier (1-5)
# Valid values: GREEN, YELLOW, WHITE, RED, PURPLE, BLUE, PINK
tier-colors:
  1: GREEN
  2: YELLOW
  3: WHITE
  4: RED
  5: PURPLE

# Sidebar line formats.
# Supports legacy § color codes.
# Available placeholders per line:
#   {player}      — player's in-game name
#   {balance}     — formatted balance (e.g. 1.2k, 5m)
#   {level}       — player's current rank level
#   {xp-current}  — XP progress percentage (0%-100%)
#   {xp-required} — Always "100%" (target percentage)
#   {datetime}    — current date/time string
lines:
  datetime:  "§7{datetime}"
  separator: "§r "
  player:    "§b{player}"
  balance:   "§d* §5Balance: §f${balance}"
  level:     "§d* §5Level: §f{level}"
  xp:        "§d* §5XP: §f{xp-current}"
  xp-maxed:  "§d* §5MAX LEVEL"
