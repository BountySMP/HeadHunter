# ============================================================
# HeadHunter — mobs.yml
# Mob economy, XP thresholds, and level progression.
# Reload with: /hh reload mobs
# ============================================================

# XP awarded per head sold (global multiplier, applies to all mobs)
xp-per-head: 1

# Default flat money cost per /rankup when no mob entry matches the current level
rankup-cost: 500

# XP required to advance FROM each level to the next.
# XP resets to 0 on every rank-up.
# Level 25 is max — set to 0.
level-xp-required:
  1: 100
  2: 50
  3: 50
  4: 50
  5: 50
  6: 50
  7: 50
  8: 50
  9: 50
  10: 100
  11: 100
  12: 100
  13: 100
  14: 100
  15: 200
  16: 200
  17: 200
  18: 200
  19: 200
  20: 500
  21: 500
  22: 500
  23: 500
  24: 1000
  25: 0

# Per-mob configuration
# drop_chance:    probability [0.0-1.0] this mob's head drops
# sell_price:     coins paid per head via Vault
# tier:           progression tier (1-5); 0 = no tier
# level:          required player level to sell this head; 0 = no level requirement
# cost_to_rankup: money cost to rank up FROM this level
# custom_drop:    optional custom drop override
mobs:
  # ── Tier 1 (Levels 1–5) ───────────────────────────────────
  PIG:
    drop_chance: 1.0
    sell_price: 5
    tier: 1
    level: 1
    cost_to_rankup: 500
    custom_drop:
  CHICKEN:
    drop_chance: 1.0
    sell_price: 3
    tier: 1
    level: 2
    cost_to_rankup: 1000
